{% extends "base.html" %}

{% block title %}Sign up{% endblock %}

{% block content %}
<div class="auth-panel">
  <header class="page-header">
    <h1>Create an account</h1>
    <p class="lede">Save books to your personal shelf.</p>
  </header>

  <form class="auth-form" method="post" action="{% url 'catalog:signup' %}">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label>
        {{ field.label }}
        {{ field }}
        {% if field.errors %}<span class="field-error">{{ field.errors|striptags }}</span>{% endif %}
        {% if field.help_text %}<span class="help">{{ field.help_text|safe }}</span>{% endif %}
      </label>
    {% endfor %}
    <button type="submit" class="btn">Sign up</button>
  </form>
  <p class="hint" style="text-align:center;">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</div>
{% endblock %}
